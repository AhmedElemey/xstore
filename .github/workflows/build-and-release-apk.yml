# =============================================================================
# GitHub Actions — manual APK build & release for xStore
# =============================================================================
#
# SECRETS (Settings → Secrets and variables → Actions → Secrets)
# -----------------------------------------------------------------------------
# MAIL_USERNAME   Gmail address used as SMTP login and "From" address
#                 (e.g. you@gmail.com)
# MAIL_PASSWORD   Gmail App Password (16-char token) — NOT your Gmail password
# MAIL_TO         Recipient email address for build notifications
#
# GITHUB_TOKEN is provided automatically by GitHub Actions and is sufficient
# for creating releases in this repository. No Personal Access Token required.
# This workflow requests `contents: write` so the default token can publish
# releases and upload assets.
#
# VARIABLES (Settings → Secrets and variables → Actions → Variables)
# -----------------------------------------------------------------------------
# API_BASE_URL_DEV   Harmless placeholder origin (no trailing slash) — satisfies release
#                    compile-time assert; not used while MOCK=true.
# API_BASE_URL_PROD  Same as dev for now; replace both with real URLs when backend exists.
#
# MOCK=true because xStore has no live backend yet — switch to MOCK=false in this
# workflow (and Taskfile.yml) once a backend exists.
#
# These are compile-time values passed via --dart-define=API_BASE_URL=...
# Release builds assert if API_BASE_URL is empty (see lib/core/network/api_endpoints.dart).
#
# SIGNING (release APK builds only)
# -----------------------------------------------------------------------------
# KEYSTORE_BASE64    Base64-encoded release keystore (android/app/release.keystore)
# KEYSTORE_PASSWORD  Keystore store password
# KEY_ALIAS          Key alias inside the keystore (e.g. xstore-release)
# KEY_PASSWORD       Key password (often the same as KEYSTORE_PASSWORD)
#
# BUILD NOTES
# -----------------------------------------------------------------------------
# - Android productFlavors: dev (com.xstore.app.dev) and prod (com.xstore.app).
# - Entry points: lib/main_dev.dart / lib/main_prod.dart via --flavor and -t.
# - Dart SDK: ^3.9.2 (pubspec.yaml). CI uses Flutter 3.35.6 (stable, Dart 3.9.2).
# - Always pass --dart-define=MOCK=true for release APKs while no live backend exists
#   (MockConfig defaults MOCK to true at compile time; explicit for clarity).
# =============================================================================

name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.35.6"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Resolve app version
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          APP_VERSION="${VERSION_LINE%%+*}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "full_version=${VERSION_LINE}" >> "$GITHUB_OUTPUT"

      - name: Resolve API base URL for flavor
        id: api
        run: |
          FLAVOR="${{ inputs.flavor }}"
          if [ "$FLAVOR" = "dev" ]; then
            API_URL="${{ vars.API_BASE_URL_DEV }}"
          else
            API_URL="${{ vars.API_BASE_URL_PROD }}"
          fi
          if [ -z "$API_URL" ]; then
            echo "::error::API_BASE_URL_${FLAVOR^^} variable is not set in repository variables."
            exit 1
          fi
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Missing one or more signing secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo "storePassword=${KEYSTORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=app/release.keystore"
          } > android/key.properties

      - name: Build release APK
        run: |
          flutter build apk --release \
            --flavor ${{ inputs.flavor }} \
            -t lib/main_${{ inputs.flavor }}.dart \
            --dart-define=API_BASE_URL="${{ steps.api.outputs.api_url }}" \
            --dart-define=MOCK=true

      - name: Remove signing material from workspace
        if: always()
        run: |
          rm -f android/app/release.keystore android/key.properties

      - name: Rename APK artifact
        id: apk
        run: |
          FLAVOR="${{ inputs.flavor }}"
          VERSION="${{ steps.version.outputs.app_version }}"
          RUN="${{ github.run_number }}"
          SRC="build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-release.apk"
          DEST="xstore-${FLAVOR}-v${VERSION}-${RUN}.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected APK not found at $SRC"
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi
          cp "$SRC" "$DEST"
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.flavor }}-v${{ steps.version.outputs.app_version }}-${{ github.run_number }}
          name: xStore ${{ inputs.flavor }} build #${{ github.run_number }}
          prerelease: ${{ inputs.flavor == 'dev' }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: xStore ${{ inputs.flavor }} APK - Build #${{ github.run_number }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            xStore APK build completed successfully.

            Flavor:       ${{ inputs.flavor }}
            Build number: ${{ github.run_number }}
            App version:  ${{ steps.version.outputs.full_version }} (pubspec.yaml)
            Commit SHA:   ${{ github.sha }}

            GitHub Release: ${{ steps.release.outputs.url }}

            Download the APK from the release assets on the page above.
