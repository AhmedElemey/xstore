# =============================================================================
# GitHub Actions — APK build & release for xStore
# =============================================================================
#
# TRIGGERS
# -----------------------------------------------------------------------------
# - push to main: builds the PROD flavor automatically (skips docs-only pushes).
# - workflow_dispatch: manual run with a flavor choice (dev or prod).
# The version-bump commit is pushed with [skip ci] and the default GITHUB_TOKEN,
# so it never retriggers this workflow (or CI).
#
# SECRETS (Settings → Secrets and variables → Actions → Secrets)
# -----------------------------------------------------------------------------
# MAIL_USERNAME   Gmail address used as SMTP login and "From" address
#                 (e.g. you@gmail.com)
# MAIL_PASSWORD   Gmail App Password (16-char token) — NOT your Gmail password
# MAIL_TO         Primary recipient email address for build notifications
#                 (mohamedmax728@gmail.com and Mohammedelbakly8@gmail.com are
#                 also notified on every release — see Send email notification)
#
# GITHUB_TOKEN is provided automatically by GitHub Actions and is sufficient
# for creating releases in this repository. No Personal Access Token required.
# This workflow requests `contents: write` so the default token can publish
# releases and upload assets.
#
# API base URLs are workflow env defaults pointing at the live hosted backend
# (xstoreegy-001-site1.jtempurl.com). Override below if the host changes.
#
# MOCK=false: release APKs run against the live backend. Flip back to
# MOCK=true here (and in Taskfile.yml) only for mock-data demo builds.
#
# These are compile-time values passed via --dart-define=API_BASE_URL=...
# Release builds assert if API_BASE_URL is empty (see lib/core/network/api_endpoints.dart).
#
# SIGNING (release APK builds only)
# -----------------------------------------------------------------------------
# KEYSTORE_BASE64    Base64-encoded release keystore (android/app/release.keystore)
# KEYSTORE_PASSWORD  Keystore store password
# KEY_ALIAS          Key alias inside the keystore (e.g. xstore-release)
# KEY_PASSWORD       Key password (often the same as KEYSTORE_PASSWORD)
#
# BUILD NOTES
# -----------------------------------------------------------------------------
# - Android productFlavors: dev (com.xstore.app.dev) and prod (com.xstore.app).
# - Entry points: lib/main_dev.dart / lib/main_prod.dart via --flavor and -t.
# - Dart SDK: ^3.9.2 (pubspec.yaml). CI uses Flutter 3.35.6 (stable, Dart 3.9.2).
# - MOCK=false is passed explicitly for release APKs (MockConfig defaults MOCK
#   to true at compile time, which is only right for local dev and tests).
# - Every run auto-increments the build number (the `+N` in pubspec.yaml's
#   `version:` line) and commits that change back to the branch before
#   building, so each release has a unique, traceable build number.
# =============================================================================

name: Build and Release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs_business/**"
      - ".claude/**"
  workflow_dispatch:
    inputs:
      flavor:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

# Serialize runs: overlapping pushes would race on the version-bump commit.
# Queued (not cancelled) so every push still gets its release.
concurrency:
  group: build-and-release-apk
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.35.6"
  API_BASE_URL_DEV: "https://xstoreegy-001-site1.jtempurl.com"
  API_BASE_URL_PROD: "https://xstoreegy-001-site1.jtempurl.com"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # Push events carry no inputs — default them to the prod flavor.
      BUILD_FLAVOR: ${{ inputs.flavor || 'prod' }}
      BUILD_RUN_NUMBER: ${{ github.run_number }}
      BUILD_SHA: ${{ github.sha }}
      RELEASE_REPO: ${{ github.repository }}
      RELEASE_HOST: ${{ github.server_url }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"

      - name: Set up Flutter
        run: bash .github/scripts/setup-flutter.sh "$FLUTTER_VERSION" android

      - name: Bump build number in pubspec.yaml
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          APP_VERSION="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${VERSION_LINE##*+}"
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          FULL_VERSION="${APP_VERSION}+${NEW_BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${FULL_VERSION}/" pubspec.yaml
          {
            echo "APP_VERSION=${APP_VERSION}"
            echo "FULL_VERSION=${FULL_VERSION}"
          } >> "$GITHUB_ENV"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump build number to ${FULL_VERSION} [skip ci]"
          # main may have moved while this run was queued — rebase the bump on top.
          git pull --rebase origin main
          git push

      - name: Resolve API base URL for flavor
        run: |
          if [ "$BUILD_FLAVOR" = "dev" ]; then
            echo "API_URL=${API_BASE_URL_DEV}" >> "$GITHUB_ENV"
          else
            echo "API_URL=${API_BASE_URL_PROD}" >> "$GITHUB_ENV"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Configure release signing
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Missing one or more signing secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo "storePassword=${KEYSTORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=app/release.keystore"
          } > android/key.properties

      - name: Build release APK
        run: |
          flutter build apk --release \
            --flavor "$BUILD_FLAVOR" \
            -t "lib/main_${BUILD_FLAVOR}.dart" \
            --dart-define=API_BASE_URL="$API_URL" \
            --dart-define=MOCK=false

      - name: Remove signing material from workspace
        if: always()
        run: rm -f android/app/release.keystore android/key.properties

      - name: Rename APK artifact
        run: |
          SRC="build/app/outputs/flutter-apk/app-${BUILD_FLAVOR}-release.apk"
          DEST="xstore-${BUILD_FLAVOR}-v${APP_VERSION}-${BUILD_RUN_NUMBER}.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected APK not found at $SRC"
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi
          cp "$SRC" "$DEST"
          echo "APK_PATH=${DEST}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${BUILD_FLAVOR}-v${APP_VERSION}-${BUILD_RUN_NUMBER}"
          ARGS=(--title "xStore ${BUILD_FLAVOR} build #${BUILD_RUN_NUMBER}" --generate-notes)
          if [ "$BUILD_FLAVOR" = "dev" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "$APK_PATH" "${ARGS[@]}"
          echo "RELEASE_URL=${RELEASE_HOST}/${RELEASE_REPO}/releases/tag/${TAG}" >> "$GITHUB_ENV"

      - name: Send email notification
        run: |
          if [ -z "$MAIL_USERNAME" ] || [ -z "$MAIL_PASSWORD" ] || [ -z "$MAIL_TO" ]; then
            echo "::error::Missing MAIL_USERNAME, MAIL_PASSWORD, or MAIL_TO secrets."
            exit 1
          fi
          RECIPIENTS=(
            "$MAIL_TO"
            "mohamedmax728@gmail.com"
            "Mohammedelbakly8@gmail.com"
            "rehab.mhmd2@gmail.com"
          )
          TO_HEADER=$(IFS=, ; echo "${RECIPIENTS[*]}")
          MAIL_RCPT_ARGS=()
          for rcpt in "${RECIPIENTS[@]}"; do
            rcpt="${rcpt#"${rcpt%%[![:space:]]*}"}"
            rcpt="${rcpt%"${rcpt##*[![:space:]]}"}"
            [ -n "$rcpt" ] || continue
            MAIL_RCPT_ARGS+=(--mail-rcpt "$rcpt")
          done
          SUBJECT="xStore ${BUILD_FLAVOR} APK - Build #${BUILD_RUN_NUMBER}"
          BODY="xStore APK build completed successfully.

          Flavor:       ${BUILD_FLAVOR}
          Build number: ${BUILD_RUN_NUMBER}
          App version:  ${FULL_VERSION} (pubspec.yaml)
          Commit SHA:   ${BUILD_SHA}

          GitHub Release: ${RELEASE_URL}

          Download the APK from the release assets on the page above."
          {
            echo "From: ${MAIL_USERNAME}"
            echo "To: ${TO_HEADER}"
            echo "Subject: ${SUBJECT}"
            echo "Content-Type: text/plain; charset=utf-8"
            echo
            echo "$BODY"
          } | curl --fail --silent --show-error \
            --url "smtps://smtp.gmail.com:465" \
            --ssl-reqd \
            --mail-from "$MAIL_USERNAME" \
            "${MAIL_RCPT_ARGS[@]}" \
            --user "${MAIL_USERNAME}:${MAIL_PASSWORD}" \
            --upload-file -
