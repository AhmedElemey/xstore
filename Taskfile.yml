version: 3

tasks:
  build-obfuscate-apk:
    cmds:
      - task clean
      - flutter build apk --obfuscate --split-debug-info=build/debug-info  --target-platform android-arm64,android-arm

  shorebird-android:
    cmds:
      - task clean
      - shorebird release android --artifact=apk
  shorebird-ios:
    cmds:
      - task clean
      - cd ios && pod install && cd ..
      # - flutter build ipa
      - shorebird release ios

  build-obfuscate-bundle:
    cmds:
      - task clean
      - flutter build appbundle --obfuscate --split-debug-info=build/debug-info
  generate-build:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

  generate-watch:
    cmds:
      - flutter pub run build_runner watch --delete-conflicting-outputs

  enable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app com.example.xstore

  disable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app .none

  ios-clean:
    cmds:
      - flutter clean
      - flutter pub get
      - rm -rf ios/Pods ios/Podfile.lock
      - rm -rf ~/Library/Developer/Xcode/DerivedData
      - cd ios
      - pod repo update
      - pod install
  clean:
    cmds:
      - flutter clean
      # - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path 'build') { Remove-Item -Recurse -Force 'build' }"
      #   platforms: [windows]
      # - cmd: rm -rf build
      #   platforms: [linux, darwin]
      - flutter pub get

  feature:
    cmds:
      - mason make riverpod_clean_feature

  # erase:
  #   cmds:
  #     # - adb shell pm uninstall
  #     - adb uninstall sa.arco.services

  # splash:
  #   cmds:
  #     - flutter pub run flutter_native_splash:create
  splash:
    cmds:
      - flutter pub run flutter_native_splash:create

  icons:
    cmds:
      - flutter pub get
      - flutter pub run flutter_launcher_icons:main

  freezed:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

  # apk:
  #   cmds:
  #     - flutter build apk --release --dart-define=ARCO_API="https://test.arco.sa:620/Api/Mobile" "--dart-define=MAPS_KEY=AIzaSyBpb2i-vgld0n2AjBJiTifgilbEtwBknbo"
  # aab:
