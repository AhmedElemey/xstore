# =============================================================================
# go-task (Task) — https://taskfile.dev
# =============================================================================
#
# Install:
#   macOS:   brew install go-task
#   Linux:   sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
#   Windows: choco install go-task
#   Other:   https://taskfile.dev/installation/
#
# Override API URLs at call time (shell env vars take precedence over defaults below):
#   API_BASE_URL_DEV=https://staging.example.com task build:dev
#   API_BASE_URL_PROD=https://api.example.com task build:prod
#
# MOCK=false: builds run against the live hosted backend
# (xstoreegy-001-site1.jtempurl.com, verified serving /api/* over HTTPS).
# Pass MOCK=true manually if you ever need a mock-data build.
#
# Release APK builds require android/key.properties and a release keystore locally.
# =============================================================================

version: 3

vars:
  API_BASE_URL_DEV:
    sh: echo ${API_BASE_URL_DEV:-https://xstoreegy-001-site1.jtempurl.com}
  API_BASE_URL_PROD:
    sh: echo ${API_BASE_URL_PROD:-https://xstoreegy-001-site1.jtempurl.com}

tasks:
  version:bump:
    desc: Increment the build number (the +N in pubspec.yaml's version line)
    cmds:
      - |
        VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
        APP_VERSION="${VERSION_LINE%%+*}"
        BUILD_NUMBER="${VERSION_LINE##*+}"
        NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
        NEW_VERSION_LINE="${APP_VERSION}+${NEW_BUILD_NUMBER}"
        perl -pi -e "s/^version: .*/version: ${NEW_VERSION_LINE}/" pubspec.yaml
        echo "Bumped version: ${VERSION_LINE} -> ${NEW_VERSION_LINE}"

  build:dev:
    desc: Build release APK for the dev flavor (com.xstore.app.dev)
    cmds:
      - flutter build apk --release --flavor dev -t lib/main_dev.dart --dart-define=API_BASE_URL="{{.API_BASE_URL_DEV}}" --dart-define=MOCK=false

  build:prod:
    desc: Build release APK for the prod flavor (com.xstore.app)
    cmds:
      - flutter build apk --release --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL="{{.API_BASE_URL_PROD}}" --dart-define=MOCK=false

  build:all:
    desc: Build release APKs for dev and prod in sequence
    cmds:
      - task: build:dev
      - task: build:prod

  release:apk:
    desc: Bump the build number, then build release APKs for dev and prod (LOCAL — no GitHub, no email)
    cmds:
      - task: version:bump
      - task: build:all

  release:remote:dev:
    desc: Trigger the GitHub Actions release workflow for dev (bumps version, builds, publishes a release, and emails you the APK link)
    cmds:
      - gh workflow run build-and-release-apk.yml -f flavor=dev

  release:remote:prod:
    desc: Trigger the GitHub Actions release workflow for prod (bumps version, builds, publishes a release, and emails you the APK link)
    cmds:
      - gh workflow run build-and-release-apk.yml -f flavor=prod

  release:remote:all:
    desc: Trigger the GitHub Actions release workflow for both dev and prod
    cmds:
      - task: release:remote:dev
      - task: release:remote:prod

  build-obfuscate-apk:
    cmds:
      - task clean
      - flutter build apk --obfuscate --split-debug-info=build/debug-info  --target-platform android-arm64,android-arm

  shorebird-android:
    cmds:
      - task clean
      - shorebird release android --artifact=apk
  shorebird-ios:
    cmds:
      - task clean
      - cd ios && pod install && cd ..
      # - flutter build ipa
      - shorebird release ios

  build-obfuscate-bundle:
    cmds:
      - task clean
      - flutter build appbundle --obfuscate --split-debug-info=build/debug-info
  generate-build:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

  generate-watch:
    cmds:
      - flutter pub run build_runner watch --delete-conflicting-outputs

  enable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app com.example.xstore

  disable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app .none

  ios-clean:
    cmds:
      - flutter clean
      - flutter pub get
      - rm -rf ios/Pods ios/Podfile.lock
      - rm -rf ~/Library/Developer/Xcode/DerivedData
      - cd ios
      - pod repo update
      - pod install
  clean:
    cmds:
      - flutter clean
      # - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path 'build') { Remove-Item -Recurse -Force 'build' }"
      #   platforms: [windows]
      # - cmd: rm -rf build
      #   platforms: [linux, darwin]
      - flutter pub get

  feature:
    cmds:
      - mason make riverpod_clean_feature

  # erase:
  #   cmds:
  #     # - adb shell pm uninstall
  #     - adb uninstall sa.arco.services

  # splash:
  #   cmds:
  #     - flutter pub run flutter_native_splash:create
  splash:
    cmds:
      - flutter pub run flutter_native_splash:create

  icons:
    cmds:
      - flutter pub get
      - flutter pub run flutter_launcher_icons:main

  freezed:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

