# =============================================================================
# go-task (Task) — https://taskfile.dev
# =============================================================================
#
# Install:
#   macOS:   brew install go-task
#   Linux:   sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
#   Windows: choco install go-task
#   Other:   https://taskfile.dev/installation/
#
# Override API URLs at call time (shell env vars take precedence over defaults below):
#   API_BASE_URL_DEV=https://staging.example.com task build:dev
#   API_BASE_URL_PROD=https://api.example.com task build:prod
#
# MOCK=true because xStore has no live backend yet — switch to MOCK=false and set
# real API_BASE_URL_DEV/PROD once a backend exists. API_BASE_URL must still be
# non-empty for release compile-time asserts even when mock data is used.
#
# Release APK builds require android/key.properties and a release keystore locally.
# =============================================================================

version: 3

vars:
  API_BASE_URL_DEV:
    sh: echo ${API_BASE_URL_DEV:-https://api.xstore.local}
  API_BASE_URL_PROD:
    sh: echo ${API_BASE_URL_PROD:-https://api.xstore.local}

tasks:
  build:dev:
    desc: Build release APK for the dev flavor (com.xstore.app.dev)
    cmds:
      - flutter build apk --release --flavor dev -t lib/main_dev.dart --dart-define=API_BASE_URL="{{.API_BASE_URL_DEV}}" --dart-define=MOCK=true

  build:prod:
    desc: Build release APK for the prod flavor (com.xstore.app)
    cmds:
      - flutter build apk --release --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL="{{.API_BASE_URL_PROD}}" --dart-define=MOCK=true

  build:all:
    desc: Build release APKs for dev and prod in sequence
    cmds:
      - task: build:dev
      - task: build:prod

  build-obfuscate-apk:
    cmds:
      - task clean
      - flutter build apk --obfuscate --split-debug-info=build/debug-info  --target-platform android-arm64,android-arm

  shorebird-android:
    cmds:
      - task clean
      - shorebird release android --artifact=apk
  shorebird-ios:
    cmds:
      - task clean
      - cd ios && pod install && cd ..
      # - flutter build ipa
      - shorebird release ios

  build-obfuscate-bundle:
    cmds:
      - task clean
      - flutter build appbundle --obfuscate --split-debug-info=build/debug-info
  generate-build:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

  generate-watch:
    cmds:
      - flutter pub run build_runner watch --delete-conflicting-outputs

  enable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app com.example.xstore

  disable-debug-firebase:
    cmds:
      - adb shell setprop debug.firebase.analytics.app .none

  ios-clean:
    cmds:
      - flutter clean
      - flutter pub get
      - rm -rf ios/Pods ios/Podfile.lock
      - rm -rf ~/Library/Developer/Xcode/DerivedData
      - cd ios
      - pod repo update
      - pod install
  clean:
    cmds:
      - flutter clean
      # - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path 'build') { Remove-Item -Recurse -Force 'build' }"
      #   platforms: [windows]
      # - cmd: rm -rf build
      #   platforms: [linux, darwin]
      - flutter pub get

  feature:
    cmds:
      - mason make riverpod_clean_feature

  # erase:
  #   cmds:
  #     # - adb shell pm uninstall
  #     - adb uninstall sa.arco.services

  # splash:
  #   cmds:
  #     - flutter pub run flutter_native_splash:create
  splash:
    cmds:
      - flutter pub run flutter_native_splash:create

  icons:
    cmds:
      - flutter pub get
      - flutter pub run flutter_launcher_icons:main

  freezed:
    cmds:
      - flutter pub run build_runner build --delete-conflicting-outputs

  # apk:
  #   cmds:
  #     - flutter build apk --release --dart-define=ARCO_API="https://test.arco.sa:620/Api/Mobile" "--dart-define=MAPS_KEY=AIzaSyBpb2i-vgld0n2AjBJiTifgilbEtwBknbo"
  # aab:
  #   cmds:
  #     - flutter build appbundle --release --dart-define=ARCO_API="https://test.arco.sa:620/Api/Mobile" "--dart-define=MAPS_KEY=AIzaSyBpb2i-vgld0n2AjBJiTifgilbEtwBknbo"

  delete-branch:
    cmds:
      - git branch -D {{.CLI_ARGS}}
      - git push origin -d {{.CLI_ARGS}}
