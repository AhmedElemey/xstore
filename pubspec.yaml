name: xstore
description: "xStore Flutter application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Functional (Either<Failure, T> in repositories / use cases)
  fpdart: ^1.1.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Share sheet
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # UI Utilities
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  # Spec lists ^4.2.1; that release conflicts with Flutter Material's
  # CarouselController — use 5.x until upstream aligns.
  carousel_slider: ^5.1.1
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  flutter_cache_manager: ^3.4.1
  pinput: ^5.0.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  flutter_facebook_auth: ^7.0.1
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  crypto: ^3.0.3
  geolocator: ^13.0.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/google_logo.svg
    - assets/icons/facebook_logo.svg
